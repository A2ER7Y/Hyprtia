# Hyprtia adaptation of Brain_Shell's hyprlock layout.
# Original: https://github.com/Brainitech/Brain_Shell

$font = Noto Sans
$font_bold = Noto Sans Bold

general {
  hide_cursor = true
}

background {
  monitor =
  path = screenshot
  blur_passes = 2
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

label {
  monitor =
  text = cmd[update:1000] date +%A
  color = rgba(122, 162, 247, 1.0)
  font_size = 90
  font_family = $font_bold
  position = 0, 350
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] date "+%d %B"
  color = rgba(122, 162, 247, 1.0)
  font_size = 40
  font_family = $font_bold
  position = 0, 250
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] date "+- %H:%M -"
  color = rgba(122, 162, 247, 1.0)
  font_size = 20
  font_family = $font_bold
  position = 0, 190
  halign = center
  valign = center
}

shape {
  monitor =
  size = 300, 60
  color = rgba(36, 40, 59, 1.0)
  rounding = -1
  border_size = 0
  position = 0, -130
  halign = center
  valign = center
}

label {
  monitor =
  text =  $USER
  color = rgba(192, 202, 245, 1.0)
  font_size = 18
  font_family = $font_bold
  position = 0, -130
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 300, 60
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(122, 162, 247, 1.0)
  inner_color = rgba(36, 40, 59, 1.0)
  font_color = rgba(192, 202, 245, 1.0)
  fade_on_empty = false
  font_family = $font_bold
  placeholder_text = <i>Enter password</i>
  hide_input = false
  position = 0, -210
  halign = center
  valign = center
}
