# Hyprtia defaults for StratOS Hyprland sessions.
# This file is managed by hyprtia-hyprland-setup.

input {
    # French AZERTY keyboard layout.
    kb_layout = fr
}

# Load plugins first, then reparse their custom window-rule effects.
exec-once = sh -c 'hyprpm reload && hyprctl reload'

# Keep every floating window reachable on screen.
windowrule {
    name = hyprtia-confined-floats
    match:class = .*
    confined-floats:confine = true
}
