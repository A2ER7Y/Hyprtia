# Hyprtia defaults for StratOS Hyprland sessions.
# This file is managed by hyprtia-hyprland-setup.

input {
    # French AZERTY keyboard layout.
    kb_layout = fr
}

# Load plugins enabled through hyprpm on every Hyprland session.
exec-once = hyprpm reload

# Keep every floating window reachable on screen.
windowrulev2 = confined-floats:confine, class:.*
